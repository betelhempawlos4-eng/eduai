<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EduAI — Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: #07070f; min-height: 100vh; display: flex; align-items: center; justify-content: center; color: #e8e6f0; }
.bg { position: fixed; inset: 0; background-image: linear-gradient(rgba(99,75,219,0.06) 1px, transparent 1px), linear-gradient(90deg, rgba(99,75,219,0.06) 1px, transparent 1px); background-size: 40px 40px; pointer-events: none; }
.card { background: #0f0e1c; border: 0.5px solid rgba(99,75,219,0.25); border-radius: 20px; padding: 2.5rem; width: 100%; max-width: 420px; position: relative; z-index: 1; }
.logo { display: flex; align-items: center; gap: 10px; margin-bottom: 2rem; justify-content: center; }
.logo-mark { width: 40px; height: 40px; background: linear-gradient(135deg, #634bdb, #29d9c2); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-family: 'Syne', sans-serif; font-weight: 800; font-size: 15px; color: white; }
.logo-text { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 22px; }
.logo-text span { color: #29d9c2; }
h2 { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 700; margin-bottom: 6px; text-align: center; }
.sub { font-size: 13px; color: #5f5c80; text-align: center; margin-bottom: 1.75rem; }
.tabs { display: flex; gap: 4px; margin-bottom: 1.5rem; background: #09091a; border-radius: 10px; padding: 4px; }
.tab-btn { flex: 1; padding: 10px; border: none; background: transparent; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; color: #5f5c80; cursor: pointer; border-radius: 8px; transition: all 0.15s; }
.tab-btn.active { background: #634bdb; color: white; }
.field { margin-bottom: 14px; }
label { display: block; font-size: 12px; color: #5f5c80; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
input { width: 100%; background: #09091a; border: 0.5px solid rgba(99,75,219,0.2); border-radius: 10px; padding: 11px 14px; font-size: 14px; color: #e8e6f0; font-family: 'DM Sans', sans-serif; outline: none; }
input:focus { border-color: rgba(99,75,219,0.5); }
input::placeholder { color: #3a3858; }
.btn { width: 100%; background: #634bdb; border: none; border-radius: 10px; padding: 13px; font-size: 14px; font-weight: 500; color: white; cursor: pointer; font-family: 'DM Sans', sans-serif; margin-top: 6px; }
.btn:hover { background: #7660e8; }
.error { background: rgba(240,112,112,0.08); border: 0.5px solid rgba(240,112,112,0.25); border-radius: 8px; padding: 10px 14px; font-size: 13px; color: #f07070; margin-bottom: 14px; }
.success { background: rgba(41,217,194,0.08); border: 0.5px solid rgba(41,217,194,0.25); border-radius: 8px; padding: 10px 14px; font-size: 13px; color: #29d9c2; margin-bottom: 14px; }
</style>
</head>
<body>
<div class="bg"></div>
<div class="card">
  <div class="logo"><div class="logo-mark">EA</div><div class="logo-text">Edu<span>AI</span></div></div>
  <h2>Welcome to EduAI</h2>
  <p class="sub">Your AI-powered student platform</p>
  <div class="tabs">
    <button class="tab-btn active" id="tab-login" onclick="showLogin()">Sign In</button>
    <button class="tab-btn" id="tab-signup" onclick="showSignup()">Sign Up</button>
  </div>
  <div id="msg"></div>
  <div id="login-form">
    <div class="field"><label>Email</label><input type="email" id="login-email" placeholder="you@email.com"></div>
    <div class="field"><label>Password</label><input type="password" id="login-pass" placeholder="••••••••"></div>
    <button class="btn" id="login-btn" onclick="login()">Sign In</button>
  </div>
  <div id="signup-form" style="display:none;">
    <div class="field"><label>Full Name</label><input type="text" id="signup-name" placeholder="Your full name"></div>
    <div class="field"><label>Email</label><input type="email" id="signup-email" placeholder="you@email.com"></div>
    <div class="field"><label>Password</label><input type="password" id="signup-pass" placeholder="At least 6 characters"></div>
    <button class="btn" id="signup-btn" onclick="signup()">Create Account</button>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const sb = window.supabase.createClient('https://elmonhypmxxuaurnjhqu.supabase.co','sb_publishable_hUiw-DkUkAtiImxgK6_frQ_RIRt305F');
sb.auth.getSession().then(({data})=>{ if(data.session) window.location.href='/'; });
function showLogin(){ document.getElementById('login-form').style.display='block'; document.getElementById('signup-form').style.display='none'; document.getElementById('tab-login').classList.add('active'); document.getElementById('tab-signup').classList.remove('active'); document.getElementById('msg').innerHTML=''; }
function showSignup(){ document.getElementById('login-form').style.display='none'; document.getElementById('signup-form').style.display='block'; document.getElementById('tab-signup').classList.add('active'); document.getElementById('tab-login').classList.remove('active'); document.getElementById('msg').innerHTML=''; }
function showMsg(text,type){ document.getElementById('msg').innerHTML=`<div class="${type}">${text}</div>`; }
async function login(){ const email=document.getElementById('login-email').value.trim(); const pass=document.getElementById('login-pass').value; if(!email||!pass) return showMsg('Please fill in all fields.','error'); const btn=document.getElementById('login-btn'); btn.disabled=true; btn.textContent='Signing in...'; const {error}=await sb.auth.signInWithPassword({email,password:pass}); if(error){showMsg(error.message,'error');btn.disabled=false;btn.textContent='Sign In';}else window.location.href='/'; }
async function signup(){ const name=document.getElementById('signup-name').value.trim(); const email=document.getElementById('signup-email').value.trim(); const pass=document.getElementById('signup-pass').value; if(!name||!email||!pass) return showMsg('Please fill in all fields.','error'); if(pass.length<6) return showMsg('Password must be at least 6 characters.','erro
