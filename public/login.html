<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EduAI — Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: #07070f; min-height: 100vh; display: flex; align-items: center; justify-content: center; color: #e8e6f0; }
.card { background: #0f0e1c; border: 0.5px solid rgba(99,75,219,0.25); border-radius: 20px; padding: 2.5rem; width: 100%; max-width: 420px; }
.logo { display: flex; align-items: center; gap: 10px; margin-bottom: 2rem; justify-content: center; }
.logo-mark { width: 40px; height: 40px; background: linear-gradient(135deg, #634bdb, #29d9c2); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-family: 'Syne', sans-serif; font-weight: 800; font-size: 15px; color: white; }
.logo-text { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 22px; color: #e8e6f0; }
.logo-text span { color: #29d9c2; }
h2 { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 700; margin-bottom: 6px; text-align: center; color: #e8e6f0; }
.sub { font-size: 13px; color: #5f5c80; text-align: center; margin-bottom: 1.75rem; }
.field { margin-bottom: 14px; }
label { display: block; font-size: 12px; color: #5f5c80; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
input { width: 100%; background: #09091a; border: 0.5px solid rgba(99,75,219,0.2); border-radius: 10px; padding: 11px 14px; font-size: 14px; color: #e8e6f0; font-family: 'DM Sans', sans-serif; outline: none; }
.btn { width: 100%; background: #634bdb; border: none; border-radius: 10px; padding: 13px; font-size: 14px; font-weight: 500; color: white; cursor: pointer; font-family: 'DM Sans', sans-serif; margin-top: 6px; }
.switch { text-align: center; margin-top: 16px; font-size: 13px; color: #5f5c80; }
.switch a { color: #a08aff; cursor: pointer; text-decoration: underline; }
.error { background: rgba(240,112,112,0.08); border: 0.5px solid rgba(240,112,112,0.25); border-radius: 8px; padding: 10px 14px; font-size: 13px; color: #f07070; margin-bottom: 14px; display:none; }
.success { background: rgba(41,217,194,0.08); border: 0.5px solid rgba(41,217,194,0.25); border-radius: 8px; padding: 10px 14px; font-size: 13px; color: #29d9c2; margin-bottom: 14px; display:none; }
</style>
</head>
<body>
<div class="card">
  <div class="logo"><div class="logo-mark">EA</div><div class="logo-text">Edu<span>AI</span></div></div>

  <!-- LOGIN -->
  <div id="login-section">
    <h2>Sign In</h2>
    <p class="sub">Welcome back to EduAI</p>
    <div id="login-error" class="error"></div>
    <div class="field"><label>Email</label><input type="email" id="login-email" placeholder="you@email.com"></div>
    <div class="field"><label>Password</label><input type="password" id="login-pass" placeholder="••••••••"></div>
    <button class="btn" onclick="login()">Sign In</button>
    <div class="switch">Don't have an account? <a onclick="showSection('signup')">Sign Up</a></div>
  </div>

  <!-- SIGNUP -->
  <div id="signup-section" style="display:none;">
    <h2>Create Account</h2>
    <p class="sub">Join EduAI for free</p>
    <div id="signup-error" class="error"></div>
    <div id="signup-success" class="success"></div>
    <div class="field"><label>Full Name</label><input type="text" id="signup-name" placeholder="Your full name"></div>
    <div class="field"><label>Email</label><input type="email" id="signup-email" placeholder="you@email.com"></div>
    <div class="field"><label>Password</label><input type="password" id="signup-pass" placeholder="At least 6 characters"></div>
    <button class="btn" onclick="signup()">Create Account</button>
    <div class="switch">Already have an account? <a onclick="showSection('login')">Sign In</a></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const sb = window.supabase.createClient(
  'https://elmonhypmxxuaurnjhqu.supabase.co',
  'sb_publishable_hUiw-DkUkAtiImxgK6_frQ_RIRt305F'
);

sb.auth.getSession().then(({data}) => {
  if (data.session) window.location.href = '/app.html';;
});

function showSection(name) {
  document.getElementById('login-section').style.display = name === 'login' ? 'block' : 'none';
  document.getElementById('signup-section').style.display = name === 'signup' ? 'block' : 'none';
}

async function login() {
  const email = document.getElementById('login-email').value.trim();
  const pass = document.getElementById('login-pass').value;
  const err = document.getElementById('login-error');
  err.style.display = 'none';
  if (!email || !pass) { err.textContent = 'Please fill in all fields.'; err.style.display = 'block'; return; }
  const { error } = await sb.auth.signInWithPassword({ email, password: pass });
  if (error) { err.textContent = error.message; err.style.display = 'block'; }
  else window.location.href = '/app.html';;
}

async function signup() {
  const name = document.getElementById('signup-name').value.trim();
  const email = document.getElementById('signup-email').value.trim();
  const pass = document.getElementById('signup-pass').value;
  const err = document.getElementById('signup-error');
  const suc = document.getElementById('signup-success');
  err.style.display = 'none'; suc.style.display = 'none';
  if (!name || !email || !pass) { err.textContent = 'Please fill in all fields.'; err.style.display = 'block'; return; }
  if (pass.length < 6) { err.textContent = 'Password must be at least 6 characters.'; err.style.display = 'block'; return; }
  const { error } = await sb.auth.signUp({ email, password: pass, options: { data: { full_name: name } } });
  if (error) { err.textContent = error.message; err.style.display = 'block'; }
  else { suc.textContent = 'Account created! Check your email to confirm, then sign in.'; suc.style.display = 'block'; }
}
</script>
</body>
</html>
